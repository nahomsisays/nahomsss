 <!doctype html>
 <html>
 <head>
   <meta charset="utf-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1" />
   <title>Vault Demo</title>
   <link rel="stylesheet" href="/styles.css" />
 </head>
 <body>
   <div class="container">
     <h1>Vault Demo</h1>
     <section>
       <h2>Addresses</h2>
       <pre id="addresses"></pre>
     </section>
     <section>
       <h2>Balances</h2>
       <pre id="balances"></pre>
     </section>
     <section>
       <h2>Send (Gasless)</h2>
       <input id="to" placeholder="Recipient" />
       <input id="amount" type="number" step="0.01" placeholder="Amount" />
       <button id="sendBtn">Send</button>
       <pre id="sendResult"></pre>
     </section>
     <section>
       <h2>Oracle Check</h2>
       <button id="oracleBtn">Check Sweep Decision</button>
       <pre id="oracle"></pre>
     </section>
     <section>
       <h2>Buckets</h2>
       <pre id="buckets"></pre>
     </section>
   </div>
   <script src="/app.js"></script>
 </body>
 </html>
